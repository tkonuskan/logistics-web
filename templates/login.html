{% extends 'base.html' %}
{% block title %}Giriş Yap{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height:80vh;">
    <div class="card shadow-lg p-4" style="width: 350px;">
        <h3 class="text-center mb-4 text-primary">Giriş Yap</h3>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Kullanıcı Adı</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Şifre</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Giriş</button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">Hesabınız yok mu? <a href="#">Kayıt Ol</a></small>
        </div>
    </div>
</div>
{% endblock %}
