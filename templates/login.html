<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Giriş Yap</h2>
    <form method="post" action="/api/auth/login/">
        {% csrf_token %}
        <label>Kullanıcı Adı:</label>
        <input type="text" name="username" required><br>
        <label>Şifre:</label>
        <input type="password" name="password" required><br>
        <button type="submit">Giriş</button>
    </form>
</body>
</html>
